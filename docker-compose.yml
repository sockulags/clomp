services:
  postgres:
    image: postgres:16-alpine
    container_name: loggplattform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loggplattform}
      POSTGRES_USER: ${POSTGRES_USER:-loggplattform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Bind to loopback only: the backend reaches Postgres over the compose
      # network, the host mapping exists solely for local inspection/debugging
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loggplattform} -d ${POSTGRES_DB:-loggplattform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loggplattform-backend
    ports:
      - target: 3000
        published: "${BACKEND_PORT:-3001}"
        protocol: tcp
    environment:
      - PORT=3000
      # REQUIRED: ADMIN_API_KEY must be set - no default value for security
      # Generate a secure random key: openssl rand -hex 32
      - ADMIN_API_KEY=${ADMIN_API_KEY:?ADMIN_API_KEY environment variable is required}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-loggplattform}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-loggplattform}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: loggplattform-web-ui
    ports:
      - target: 80
        published: "${WEBUI_PORT:-8080}"
        protocol: tcp
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  backend-data:
